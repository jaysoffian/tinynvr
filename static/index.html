<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TinyNVR</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
[x-cloak] { display: none !important; }

:root {
  --bg: #1a1a1a;
  --panel: #2a2a2a;
  --border: #3a3a3a;
  --text: #e0e0e0;
  --text-dim: #888;
  --green: #4caf50;
  --red: #e53935;
  --gray: #666;
  --accent: #5c9ce6;
  --timeline-bg: #222;
  --segment-color: #4caf50;
  --timeline-label-width: 90px;
  --timeline-right-pad: 12px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 14px;
  overflow: hidden;
}

/* Top bar */
.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 8px 16px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  height: 48px;
  flex-shrink: 0;
}
/* Week day picker */
.week-picker {
  display: flex;
  align-items: center;
  gap: 2px;
}
.week-picker .wp-arrow {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  padding: 2px 6px;
  line-height: 1;
}
.week-picker .wp-arrow:hover { color: var(--text); }
.week-picker .wp-day {
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 6px;
  min-width: 32px;
  gap: 1px;
}
.week-picker .wp-day:hover { background: var(--border); }
.week-picker .wp-day-label {
  font-size: 9px;
  color: var(--text-dim);
  text-transform: uppercase;
  font-weight: 500;
}
.week-picker .wp-day-num {
  font-size: 13px;
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
}
.week-picker .wp-day.selected .wp-day-num {
  background: #e87530;
  color: #fff;
  font-weight: 600;
}
.week-picker .wp-day.today .wp-day-label {
  color: #e87530;
}
.week-picker .wp-day.future,
.week-picker .wp-day.no-data {
  opacity: 0.3;
  pointer-events: none;
}
.topbar select {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 13px;
}
.topbar button {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 12px;
  font-size: 16px;
  cursor: pointer;
  line-height: 1;
}
.topbar button:hover { background: var(--border); }
.topbar-play {
  display: flex;
  align-items: center;
  justify-content: center;
}
.topbar-play svg { width: 16px; height: 16px; }
.topbar .time-display {
  font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
  font-size: 16px;
  color: var(--text);
  min-width: 70px;
}
.topbar .spacer { flex: 1; }
.topbar .version {
  font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
  font-size: 10px;
  color: var(--text-dim);
  opacity: 0.6;
  margin-right: 4px;
}

/* Main grid */
.main {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(var(--grid-cols, 2), 1fr);
  grid-auto-rows: 1fr;
  gap: 2px;
  padding: 2px;
  min-height: 0;
  background: var(--bg);
}

.video-panel {
  background: #000;
  position: relative;
  overflow: hidden;
  border-radius: 2px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.video-panel.fullscreen-panel {
  position: fixed;
  inset: 0;
  z-index: 100;
  border-radius: 0;
}
.video-panel video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}
.video-panel .panel-header {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  padding: 6px 10px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
  z-index: 2;
  pointer-events: none;
}
.video-panel.fullscreen-panel .panel-header { display: none; }
.panel-header .cam-name {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.panel-actions {
  position: absolute;
  bottom: 8px;
  left: 10px;
  z-index: 3;
  pointer-events: auto;
  display: flex;
  gap: 6px;
}
.panel-mute {
  position: absolute;
  top: 6px;
  right: 8px;
  z-index: 3;
  background: none;
  border: none;
  color: var(--text);
  opacity: 0.6;
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.panel-mute svg { width: 18px; height: 18px; }
.panel-mute:hover { opacity: 1; }
.video-panel.fullscreen-panel .panel-mute { display: none; }
.panel-action-btn {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
}
.panel-actions a,
.panel-actions .panel-action-btn {
  color: var(--text);
  text-decoration: none;
  opacity: 0;
  transition: opacity 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.panel-actions a svg,
.panel-actions .panel-action-btn svg {
  width: 20px;
  height: 20px;
}
.video-panel:hover .panel-actions a,
.video-panel:hover .panel-actions .panel-action-btn { opacity: 0.8; }
.panel-actions a:hover,
.panel-actions .panel-action-btn:hover { opacity: 1 !important; }
.video-panel.fullscreen-panel .panel-actions { display: none; }

.no-recording-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.6);
  z-index: 1;
  font-size: 14px;
  color: var(--text-dim);
}

/* Bottom timeline */
.timeline-container {
  flex-shrink: 0;
  background: var(--panel);
  border-top: 1px solid var(--border);
  padding: 6px 0 2px 0;
  user-select: none;
}
.timeline-body {
  position: relative;
}
.timeline-tracks {
  margin-left: var(--timeline-label-width);
  margin-right: var(--timeline-right-pad);
}
.timeline-track {
  display: flex;
  align-items: center;
  height: 10px;
  margin-bottom: 1px;
  position: relative;
}
.timeline-track-label {
  position: absolute;
  left: calc(-1 * var(--timeline-label-width) + 2px);
  width: calc(var(--timeline-label-width) - 6px);
  text-align: right;
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.timeline-track-bar {
  flex: 1;
  height: 6px;
  background: var(--bg);
  position: relative;
  border-radius: 1px;
  overflow: hidden;
}
.timeline-segment-block {
  position: absolute;
  top: 0;
  height: 100%;
  background: var(--segment-color);
}

/* Hour labels */
.timeline-hours {
  position: relative;
  margin-left: var(--timeline-label-width);
  margin-right: var(--timeline-right-pad);
  height: 18px;
}
.timeline-hour-mark {
  position: absolute;
  top: 2px;
  font-size: 9px;
  color: var(--text-dim);
  transform: translateX(-50%);
}
.timeline-hour-tick {
  position: absolute;
  top: 0;
  width: 1px;
  height: 3px;
  background: var(--border);
  transform: translateX(-50%);
}

/* Cursor region overlays the track+hours area with same margins */
.timeline-cursor-region {
  position: absolute;
  top: 0;
  bottom: 0;
  left: var(--timeline-label-width);
  right: var(--timeline-right-pad);
  pointer-events: none;
  z-index: 5;
}
.timeline-cursor-line {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--red);
  transform: translateX(-1px);
}
.timeline-hover-tooltip {
  position: absolute;
  top: -14px;
  transform: translateX(-50%);
  font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
  font-size: 10px;
  color: var(--text);
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 1px 4px;
  white-space: nowrap;
  pointer-events: none;
}

/* Click overlay for scrubbing - covers tracks + hours */
.timeline-click-overlay {
  position: absolute;
  top: 0;
  bottom: 0;
  left: var(--timeline-label-width);
  right: var(--timeline-right-pad);
  cursor: pointer;
  z-index: 4;
}

/* Fullscreen overlay controls */
.fs-overlay {
  position: absolute;
  inset: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  pointer-events: none;
}
.fs-overlay > * { pointer-events: auto; }
.fs-top {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
}
.fs-top .fs-cam-name {
  font-size: 15px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.fs-top .fs-close {
  background: rgba(255,255,255,0.15);
  border: none;
  color: var(--text);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.fs-top .fs-close:hover { background: rgba(255,255,255,0.25); }
.fs-top .spacer { flex: 1; }
.fs-bottom {
  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  padding: 24px 16px 12px;
}
.fs-time {
  text-align: center;
  margin-bottom: 8px;
}
.fs-time .fs-time-value {
  font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
  font-size: 18px;
  color: var(--text);
}
.fs-time .fs-date-value {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
}
.fs-left-controls {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 6px;
  flex-shrink: 0;
}
.fs-mute {
  background: none;
  border: none;
  color: var(--text);
  opacity: 0.7;
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
}
.fs-mute:hover { opacity: 1; }
.fs-mute svg { width: 20px; height: 20px; }
.fs-download {
  color: var(--text);
  text-decoration: none;
  background: none;
  border: none;
  opacity: 0.7;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  padding: 0;
  cursor: pointer;
}
.fs-download:hover:not(:disabled) { opacity: 1; }
.fs-download:disabled { cursor: wait; }
.fs-download svg { width: 20px; height: 20px; }
.fs-speed {
  background: rgba(255,255,255,0.12);
  color: var(--text);
  border: none;
  border-radius: 14px;
  padding: 4px 12px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  height: 28px;
}
.fs-scrub-row {
  display: flex;
  align-items: flex-end;
  gap: 10px;
}
.fs-play-timeline {
  display: flex;
  align-items: center;
  flex: 1;
  height: 28px;
  background: rgba(255,255,255,0.1);
  border-radius: 6px;
  overflow: visible;
  position: relative;
}
.fs-play {
  background: none;
  border: none;
  color: var(--text);
  cursor: pointer;
  padding: 0 8px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  opacity: 0.9;
}
.fs-play:hover { opacity: 1; }
.fs-play svg { width: 14px; height: 14px; }
.fs-play-divider {
  width: 1px;
  height: 16px;
  background: rgba(255,255,255,0.2);
  flex-shrink: 0;
}
.fs-timeline {
  position: relative;
  height: 100%;
  flex: 1;
}
.fs-timeline-bar {
  position: absolute;
  top: 8px;
  left: 0;
  right: 0;
  height: 12px;
  background: transparent;
  border-radius: 2px;
  overflow: hidden;
}
.fs-timeline-segment {
  position: absolute;
  top: 0;
  height: 100%;
  background: var(--segment-color);
}
.fs-timeline-cursor {
  position: absolute;
  top: 4px;
  width: 2px;
  height: 20px;
  background: #fff;
  border-radius: 1px;
  transform: translateX(-1px);
  pointer-events: none;
}
.fs-timeline-click {
  position: absolute;
  inset: 0;
  cursor: pointer;
}

/* Selection highlight */
.timeline-selection {
  position: absolute;
  top: 0;
  bottom: 0;
  background: rgba(92, 156, 230, 0.25);
  border-left: 1px solid var(--accent);
  border-right: 1px solid var(--accent);
  pointer-events: none;
  z-index: 3;
}

/* Download bar */
.selection-download-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 12px 4px var(--timeline-label-width);
  background: var(--panel);
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-dim);
  flex-shrink: 0;
}
.selection-download-bar .sel-range {
  font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
  color: var(--text);
  font-size: 12px;
}
.selection-download-bar .sel-dl-btn {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 10px;
  font-size: 12px;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.selection-download-bar .sel-dl-btn:hover:not(:disabled) { background: var(--border); }
.selection-download-bar .sel-dl-btn:disabled { opacity: 0.5; cursor: wait; }
.selection-download-bar .sel-clear {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 14px;
  padding: 0 4px;
  line-height: 1;
}
.selection-download-bar .sel-clear:hover { color: var(--text); }

/* Layout shell */
.app-shell {
  display: flex;
  flex-direction: column;
  height: 100vh;
}
</style>
</head>
<body>
<div class="app-shell" x-data="nvr()" @keydown.window="handleKey($event)">

  <!-- Top bar -->
  <div class="topbar">
    <div class="week-picker">
      <button class="wp-arrow" :style="!canGoBack && 'opacity:0.2;pointer-events:none'" @click="weekOffset--; buildWeek()">&lsaquo;</button>
      <template x-for="day in weekDays" :key="day.iso">
        <div class="wp-day"
             :class="{ selected: day.iso === selectedDate, today: day.isToday, future: day.isFuture, 'no-data': day.beforeEarliest }"
             @click="!day.isFuture && !day.beforeEarliest && changeDate(day.iso)">
          <span class="wp-day-label" x-text="day.label"></span>
          <span class="wp-day-num" x-text="day.num"></span>
        </div>
      </template>
      <button class="wp-arrow" @click="weekOffset++; buildWeek()">&rsaquo;</button>
    </div>
    <button class="topbar-play" @click="togglePlay">
      <svg x-show="!playing" viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><polygon points="6,3 20,12 6,21"/></svg>
      <svg x-show="playing" viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><rect x="5" y="3" width="4" height="18" rx="1"/><rect x="15" y="3" width="4" height="18" rx="1"/></svg>
    </button>
    <select x-model.number="playbackSpeed" @change="applySpeed()">
      <option value="0.25">0.25x</option>
      <option value="0.5">0.5x</option>
      <option value="1">1x</option>
      <option value="2">2x</option>
      <option value="4">4x</option>
      <option value="8">8x</option>
    </select>
    <span class="time-display" x-text="currentTimeDisplay"></span>
    <div class="spacer"></div>
    <span class="version" x-text="version" x-show="version"></span>
  </div>

  <!-- Video grid -->
  <div class="main" :style="'--grid-cols:' + gridColumns">
    <template x-for="(cam, idx) in cameras" :key="cam.name">
      <div class="video-panel"
           :class="{'fullscreen-panel': fullscreenIdx === idx}"
           @click="fullscreenIdx === null && toggleFullscreen(idx)">
        <div class="panel-header">
          <span class="cam-name" x-text="cam.name"></span>
        </div>
        <button class="panel-mute" @click.stop="toggleMute(idx)" :title="unmutedIdx === idx ? 'Mute' : 'Unmute'">
          <svg x-show="unmutedIdx === idx" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
          <svg x-show="unmutedIdx !== idx" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <line x1="23" y1="9" x2="17" y2="15"/>
            <line x1="17" y1="9" x2="23" y2="15"/>
          </svg>
        </button>
        <div class="panel-actions" x-show="camStates[idx]?.currentSegment" x-cloak>
          <a :href="downloadUrl(idx)" download @click.stop title="Download segment">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </a>
        </div>
        <video :id="'video-' + idx"
               x-init="_debugInstrumentVideo(idx, $el)"
               preload="auto"
               muted
               playsinline>
        </video>
        <div class="no-recording-overlay"
             x-show="!camStates[idx]?.currentSegment || camStates[idx]?.videoLoading"
             x-cloak>
          <span x-text="(loading || camStates[idx]?.videoLoading || (segments[cam.name]?.length > 0)) ? 'Loading\u2026' : 'Offline'"></span>
        </div>
        <!-- Fullscreen overlay with controls + timeline -->
        <div class="fs-overlay" x-show="fullscreenIdx === idx" x-cloak @click.stop>
          <div class="fs-top">
            <button class="fs-close" @click="fullscreenIdx = null">&times;</button>
            <span class="fs-cam-name" x-text="cam.name"></span>
            <div class="spacer"></div>
            <button class="fs-mute" @click.stop="toggleMute(idx)" :title="unmutedIdx === idx ? 'Mute' : 'Unmute'">
              <svg x-show="unmutedIdx === idx" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              </svg>
              <svg x-show="unmutedIdx !== idx" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <line x1="23" y1="9" x2="17" y2="15"/>
                <line x1="17" y1="9" x2="23" y2="15"/>
              </svg>
            </button>
          </div>
          <div class="fs-bottom">
            <div class="fs-time">
              <span class="fs-time-value" x-text="currentTimeDisplay"></span>
              <div class="fs-date-value" x-text="currentDateDisplay"></div>
            </div>
            <div class="fs-scrub-row">
              <div class="fs-left-controls">
                <button class="fs-download"
                        x-show="selectionStart && selectionEnd"
                        x-cloak
                        :disabled="downloadingCam"
                        @click.stop="downloadRange(cam.name)"
                        :title="downloadingCam === cam.name ? 'Preparing...' : 'Download selection'">
                  <svg x-show="downloadingCam !== cam.name" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                  </svg>
                  <span x-show="downloadingCam === cam.name" style="font-size:11px;" x-text="downloadPercent != null ? downloadPercent + '%' : '...'"></span>
                </button>
                <a class="fs-download" x-show="!selectionStart && camStates[idx]?.currentSegment"
                   :href="downloadUrl(idx)" download @click.stop title="Download segment">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                  </svg>
                </a>
                <select class="fs-speed" x-model.number="playbackSpeed" @change="applySpeed()">
                  <option value="1">1x</option>
                  <option value="2">2x</option>
                  <option value="4">4x</option>
                  <option value="8">8x</option>
                </select>
              </div>
              <div class="fs-play-timeline">
                <button class="fs-play" @click.stop="togglePlay">
                  <svg x-show="!playing" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>
                  <svg x-show="playing" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="3" width="4" height="18" rx="1"/><rect x="15" y="3" width="4" height="18" rx="1"/></svg>
                </button>
                <div class="fs-play-divider"></div>
                <div class="fs-timeline">
              <div class="fs-timeline-bar">
                <template x-for="seg in (segments[cam.name] || [])" :key="'fs-'+seg.filename">
                  <div class="fs-timeline-segment" :style="segmentBlockStyle(seg)"></div>
                </template>
              </div>
              <div class="timeline-selection" x-show="selectionStart && selectionEnd" x-cloak
                   :style="selectionStyle()"></div>
              <div class="fs-timeline-cursor" :style="'left:' + cursorPercent + '%'"></div>
              <div class="fs-timeline-click"
                   @mousedown.prevent="startFsScrubOrSelect($event)"
                   @mousemove.window="doFsScrub($event)"
                   @mouseup.window="endFsScrub()"
                   @touchstart.prevent="startFsScrub($event)"
                   @touchmove.window="doFsScrub($event.touches[0])"
                   @touchend.window="endFsScrub()">
              </div>
            </div>
            </div>
            </div>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- Timeline -->
  <div class="timeline-container">
    <div class="timeline-body" x-ref="timelineBody">
      <!-- Segment tracks -->
      <div class="timeline-tracks" x-ref="timelineTracks">
        <template x-for="(cam, idx) in cameras" :key="'track-'+cam.name">
          <div class="timeline-track">
            <span class="timeline-track-label" x-text="cam.name"></span>
            <div class="timeline-track-bar">
              <template x-for="seg in timelineSegments(cam)" :key="seg.filename">
                <div class="timeline-segment-block"
                     :style="segmentBlockStyle(seg)"></div>
              </template>
            </div>
          </div>
        </template>
      </div>
      <!-- Hour labels -->
      <div class="timeline-hours">
        <template x-for="(tick, i) in hourTicks" :key="i">
          <span>
            <span class="timeline-hour-tick" :style="'left:' + tick.leftPct + '%'"></span>
            <span class="timeline-hour-mark"
                  :style="'left:' + tick.leftPct + '%'"
                  x-text="tick.label"></span>
          </span>
        </template>
      </div>
      <!-- Selection highlight -->
      <div class="timeline-cursor-region" style="pointer-events:none; z-index:3;"
           x-show="selectionStart && selectionEnd" x-cloak>
        <div class="timeline-selection"
             :style="selectionStyle()"></div>
      </div>
      <!-- Cursor spanning entire timeline body -->
      <div class="timeline-cursor-region">
        <div class="timeline-cursor-line"
             :style="'left:' + cursorPercent + '%'">
        </div>
        <div class="timeline-hover-tooltip"
             x-show="hoverPct !== null"
             x-cloak
             :style="'left:' + hoverPct + '%'"
             x-text="hoverTimeDisplay"></div>
      </div>
      <!-- Invisible click overlay for scrubbing -->
      <div class="timeline-click-overlay"
           @mousedown.prevent="startScrubOrSelect($event)"
           @mousemove="onTimelineHover($event)"
           @mousemove.window="doScrub($event)"
           @mouseleave="hoverPct = null"
           @mouseup.window="endScrub()"
           @touchstart.prevent="startScrub($event)"
           @touchmove.window="doScrub($event.touches[0])"
           @touchend.window="endScrub()">
      </div>
    </div>
  </div>

  <!-- Selection download bar -->
  <div class="selection-download-bar" x-show="selectionStart && selectionEnd" x-cloak>
    <span class="sel-range" x-text="selectionRangeDisplay()"></span>
    <template x-for="cam in cameras" :key="'dl-'+cam.name">
      <button class="sel-dl-btn" :disabled="downloadingCam" @click="downloadRange(cam.name)">
        <svg x-show="downloadingCam !== cam.name" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span x-text="downloadingCam === cam.name ? (downloadPercent != null ? downloadPercent + '%' : 'Preparing...') : cam.name"></span>
      </button>
    </template>
    <button class="sel-clear" @click="clearSelection()" title="Clear selection">&times;</button>
  </div>
</div>

<script defer src="alpine.min.js"></script>
<script>
function nvr() {
  return {
    loading: true,
    cameras: [],
    segments: {},       // { cameraName: [segment, ...] }
    camStates: {},      // { idx: { currentSegment, nextSegment, loadedSrc } }
    selectedDate: (() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })(),
    wallTime: null,     // Date object: the playback position in absolute time
    playing: false,
    playbackSpeed: 1,
    fullscreenIdx: null,
    unmutedIdx: null,
    scrubbing: false,
    _clockId: null,
    _refreshId: null,
    weekOffset: 0,
    weekDays: [],
    earliestDate: null,
    version: '',
    canGoBack: true,
    hoverPct: null,    // 0-100 timeline position during hover, null when not hovering
    hoverTime: null,   // Date at hover position

    // Opt-in debug instrumentation; enabled with ?debug=1 on the URL.
    // Captures video element events + prefetch lifecycle + load calls
    // and POSTs them to /api/debug/log in small batches. Enable in
    // the browser, exercise the bug, curl GET /api/debug/log to pull
    // the file back. No cost when disabled.
    _debugEnabled: typeof location !== 'undefined' && new URLSearchParams(location.search).has('debug'),
    _debugBuffer: [],
    _debugFlushTimer: null,
    selectionStart: null,  // Date object
    selectionEnd: null,    // Date object
    downloadingCam: null,   // camera name currently downloading, or null
    downloadPercent: null,  // 0-100 or null

    get currentTimeDisplay() {
      if (!this.wallTime) return '--:--:--';
      const d = this.wallTime;
      return [d.getHours(), d.getMinutes(), d.getSeconds()]
        .map(n => String(n).padStart(2, '0')).join(':');
    },

    get currentDateDisplay() {
      if (!this.wallTime) return '';
      return this.wallTime.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
    },

    get cursorPercent() {
      if (!this.wallTime) return 0;
      const sod = this._startOfDay().getTime();
      return Math.max(0, Math.min(100, (this.wallTime.getTime() - sod) / this._dayLengthMs() * 100));
    },

    _startOfDay() {
      return new Date(this.selectedDate + 'T00:00:00');
    },

    // Local midnight of the day after selectedDate. Uses the Date
    // constructor (not ISO parsing) so DST offsets resolve from the
    // browser's tz database — spring-ahead days are 23h, fall-back 25h.
    _nextStartOfDay() {
      const [y, m, d] = this.selectedDate.split('-').map(Number);
      return new Date(y, m - 1, d + 1);
    },

    _dayLengthMs() {
      return this._nextStartOfDay().getTime() - this._startOfDay().getTime();
    },

    // One tick per real-time hour from local midnight to next local
    // midnight, labeled with the local clock hour at that instant.
    // Normal days produce 24 ticks 00..23; spring-ahead produces 23
    // ticks with one local hour absent; fall-back produces 25 ticks
    // with one local hour repeated. No DST rules hardcoded — the
    // labels come from Date.getHours() which resolves via the IANA
    // tz database.
    get hourTicks() {
      const sod = this._startOfDay().getTime();
      const dayLen = this._dayLengthMs();
      const ticks = [];
      for (let ms = 0; ms < dayLen; ms += 3600000) {
        const d = new Date(sod + ms);
        ticks.push({
          label: String(d.getHours()).padStart(2, '0'),
          leftPct: (ms / dayLen) * 100,
        });
      }
      return ticks;
    },

    buildWeek() {
      const DAY_LABELS = ['S','M','T','W','T','F','S'];
      const today = new Date();
      today.setHours(0,0,0,0);
      const sunday = new Date(today);
      sunday.setDate(sunday.getDate() - sunday.getDay() + this.weekOffset * 7);
      const days = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(sunday);
        d.setDate(d.getDate() + i);
        const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        days.push({
          iso,
          label: DAY_LABELS[i],
          num: d.getDate(),
          isToday: d.getTime() === today.getTime(),
          isFuture: d > today,
          beforeEarliest: this.earliestDate ? iso < this.earliestDate : false,
        });
      }
      this.weekDays = days;
      // Disable back arrow if the entire previous week would be before earliest
      if (this.earliestDate) {
        const prevSat = new Date(sunday);
        prevSat.setDate(prevSat.getDate() - 1);
        const prevSatIso = `${prevSat.getFullYear()}-${String(prevSat.getMonth()+1).padStart(2,'0')}-${String(prevSat.getDate()).padStart(2,'0')}`;
        this.canGoBack = prevSatIso >= this.earliestDate;
      }
    },

    get gridColumns() {
      return Math.ceil(Math.sqrt(this.cameras.length || 1));
    },

    async init() {
      if (this._debugEnabled) {
        window.addEventListener('pagehide', () => {
          if (this._debugBuffer.length === 0) return;
          const body = new Blob(
            [JSON.stringify({ events: this._debugBuffer })],
            { type: 'application/json' },
          );
          navigator.sendBeacon('/api/debug/log', body);
          this._debugBuffer = [];
        });
      }
      try {
        const [rangeRes, versionRes] = await Promise.all([
          fetch('/api/recordings/range'),
          fetch('/api/version'),
        ]);
        const range = await rangeRes.json();
        if (range.earliest) {
          this.earliestDate = range.earliest;
        }
        const version = await versionRes.json();
        if (version.commit) {
          this.version = version.commit;
        }
      } catch (e) {}
      this.buildWeek();
      await this.fetchCameras();
      this.wallTime = new Date(this.selectedDate + 'T12:00:00');
      await this.fetchAllSegments();
      this.loading = false;
      this._pickInitialWallTime();
      this.loadSegmentsForAll();
      this._startSegmentRefresh();
    },

    _isToday() {
      const now = new Date();
      const today = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
      return this.selectedDate === today;
    },

    _startSegmentRefresh() {
      this._stopSegmentRefresh();
      if (!this._isToday()) return;
      this._refreshId = setInterval(() => this.fetchAllSegments(), 60000);
    },

    _stopSegmentRefresh() {
      if (this._refreshId) {
        clearInterval(this._refreshId);
        this._refreshId = null;
      }
    },

    _pickInitialWallTime() {
      // Try to find the earliest segment across all cameras for today
      let earliest = null;
      for (const cam of this.cameras) {
        const segs = this.segments[cam.name];
        if (segs && segs.length > 0) {
          const t = new Date(segs[0].start_time);
          if (!earliest || t < earliest) earliest = t;
        }
      }
      if (earliest) {
        this.wallTime = earliest;
      } else {
        this.wallTime = new Date(this.selectedDate + 'T12:00:00');
      }
    },

    async changeDate(newDate) {
      this.pause();
      this.clearSelection();
      this.loading = true;
      this.selectedDate = newDate;
      this.wallTime = new Date(newDate + 'T12:00:00');
      await this.fetchAllSegments();
      this.loading = false;
      this._pickInitialWallTime();
      this.loadSegmentsForAll();
      this._startSegmentRefresh();
    },

    async fetchCameras() {
      try {
        const res = await fetch('/api/cameras');
        this.cameras = await res.json();
        this.cameras.forEach((_, idx) => {
          this.camStates[idx] = { currentSegment: null, nextSegment: null, loadedSrc: null, prefetchedUrl: null, videoLoading: false };
        });
      } catch (e) {
        console.error('Failed to fetch cameras:', e);
      }
    },

    _utcDatesForLocalDate() {
      // A local date spans up to 2 UTC dates (e.g. EDT midnight = 04:00 UTC)
      const localStart = this._startOfDay();
      const localEnd = new Date(localStart.getTime() + this._dayLengthMs() - 1);
      const dates = new Set([
        localStart.toISOString().slice(0, 10),
        localEnd.toISOString().slice(0, 10),
      ]);
      return [...dates];
    },

    async fetchAllSegments() {
      const utcDates = this._utcDatesForLocalDate();
      const dayStart = this._startOfDay().getTime();
      const dayEnd = dayStart + this._dayLengthMs();

      const results = await Promise.allSettled(
        this.cameras.map(async cam => {
          const allSegs = [];
          for (const utcDate of utcDates) {
            const res = await fetch(
              `/api/cameras/${encodeURIComponent(cam.name)}/segments?date_str=${utcDate}`
            );
            const segs = await res.json();
            allSegs.push(...segs);
          }
          // Keep only segments whose start falls within the local date
          const filtered = allSegs.filter(seg => {
            const t = new Date(seg.start_time).getTime();
            return t >= dayStart && t < dayEnd;
          });
          filtered.sort((a, b) => a.start_time.localeCompare(b.start_time));
          return { name: cam.name, segs: filtered };
        })
      );
      const fresh = {};
      for (const r of results) {
        if (r.status === 'fulfilled') {
          fresh[r.value.name] = r.value.segs;
        }
      }
      for (const cam of this.cameras) {
        if (!(cam.name in fresh)) fresh[cam.name] = [];
      }
      this.segments = fresh;
    },

    _parseStart(seg) {
      return new Date(seg.start_time);
    },

    _latestEnd() {
      // Find the latest playable segment end across all cameras.
      // Segments without a positive duration are either still being recorded
      // or failed to probe — skip them.
      let latest = 0;
      for (const cam of this.cameras) {
        const segs = this.segments[cam.name] || [];
        for (let i = segs.length - 1; i >= 0; i--) {
          if (segs[i].duration_sec > 0) {
            const end = this._segEnd(segs, i);
            if (end > latest) latest = end;
            break;
          }
        }
      }
      return latest;
    },

    _earliestStart() {
      // Find the earliest playable segment start across all cameras.
      let earliest = Infinity;
      for (const cam of this.cameras) {
        const segs = this.segments[cam.name] || [];
        for (const seg of segs) {
          if (seg.duration_sec > 0) {
            const start = this._parseStart(seg).getTime();
            if (start < earliest) earliest = start;
            break;
          }
        }
      }
      return earliest === Infinity ? 0 : earliest;
    },

    _clampWallTime() {
      // Keep wallTime inside the playable range so scrubbing past either
      // end lands on a position where findSegmentAt actually returns a
      // segment, rather than leaving the cameras showing "Offline".
      //
      // The upper clamp sits a full segment back from the newest closed
      // segment across cameras, because ffmpeg's segment rotation isn't
      // globally synchronized — one camera routinely sits up to a minute
      // ahead of the others, and pinning to its edge would leave the
      // other three cameras past their own latest-end.
      const earliest = this._earliestStart();
      const latest = this._latestEnd();
      if (!earliest || !latest) return;
      const t = this.wallTime.getTime();
      if (t < earliest) {
        this.wallTime = new Date(earliest);
      } else if (t >= latest - this._segmentDurationMs) {
        this.wallTime = new Date(Math.max(earliest, latest - this._segmentDurationMs));
      }
    },

    _segEnd(segs, i) {
      const start = this._parseStart(segs[i]).getTime();
      if (segs[i].duration_sec > 0) {
        return start + segs[i].duration_sec * 1000;
      }
      return start + this._segmentDurationMs;
    },

    findSegmentAt(camName, time) {
      const segs = this.segments[camName] || [];
      const t = time.getTime();
      for (let i = 0; i < segs.length; i++) {
        const start = this._parseStart(segs[i]).getTime();
        const end = this._segEnd(segs, i);
        if (t >= start && t < end) {
          return { segment: segs[i], index: i };
        }
      }
      return null;
    },

    findNextSegment(camName, currentSeg) {
      const segs = this.segments[camName] || [];
      const idx = segs.indexOf(currentSeg);
      if (idx >= 0 && idx < segs.length - 1) {
        return segs[idx + 1];
      }
      return null;
    },

    segmentUrl(camName, seg) {
      return `/api/segments/${encodeURIComponent(camName)}/${seg.filename}`;
    },

    _debug(event) {
      if (!this._debugEnabled) return;
      this._debugBuffer.push({
        wallMs: Date.now(),
        perfMs: Math.round(performance.now()),
        ...event,
      });
      if (this._debugBuffer.length >= 50) {
        this._debugFlush();
      } else if (!this._debugFlushTimer) {
        this._debugFlushTimer = setTimeout(() => this._debugFlush(), 2000);
      }
    },

    async _debugFlush() {
      if (this._debugFlushTimer) {
        clearTimeout(this._debugFlushTimer);
        this._debugFlushTimer = null;
      }
      if (!this._debugEnabled || this._debugBuffer.length === 0) return;
      const events = this._debugBuffer;
      this._debugBuffer = [];
      try {
        await fetch('/api/debug/log', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ events }),
          keepalive: true,
        });
      } catch (e) {}
    },

    _debugInstrumentVideo(idx, video) {
      if (!this._debugEnabled) return;
      const events = [
        'emptied', 'loadstart', 'loadedmetadata', 'loadeddata',
        'canplay', 'canplaythrough', 'playing', 'waiting', 'stalled',
        'seeking', 'seeked', 'error', 'ended',
      ];
      events.forEach(name => {
        video.addEventListener(name, () => {
          this._debug({
            kind: 'video',
            ev: name,
            cam: idx,
            rs: video.readyState,
            ns: video.networkState,
            ct: Number(video.currentTime.toFixed(3)),
            src: (video.src || '').split('/').pop(),
            err: video.error ? video.error.code : null,
          });
        });
      });
    },

    // Fire-and-forget prefetch of the next segment so its bytes land
    // in the HTTP cache well before video.src = nextUrl needs them.
    // The backend sets Cache-Control: public, max-age=31536000,
    // immutable on segment responses, so the cached body is reused
    // indefinitely and the subsequent <video> request reads from
    // disk instead of the network. Draining the response via .blob()
    // is required — Safari won't cache a response that's abandoned
    // mid-stream. Dedup via state.prefetchedUrl so we don't re-fetch
    // the same next-segment on every clock tick.
    _prefetchNextSegment(idx) {
      const state = this.camStates[idx];
      const cam = this.cameras[idx];
      if (!state || !cam || !state.nextSegment) return;
      const url = this.segmentUrl(cam.name, state.nextSegment);
      if (state.prefetchedUrl === url) return;
      state.prefetchedUrl = url;
      const file = state.nextSegment.filename;
      this._debug({ kind: 'prefetch', ev: 'start', cam: idx, file });
      const t0 = performance.now();
      fetch(url)
        .then(res => res.blob())
        .then(blob => {
          this._debug({
            kind: 'prefetch', ev: 'done', cam: idx, file,
            bytes: blob.size, elapsedMs: Math.round(performance.now() - t0),
          });
        })
        .catch(() => {
          this._debug({ kind: 'prefetch', ev: 'fail', cam: idx, file });
          state.prefetchedUrl = null;
        });
    },

    downloadUrl(idx) {
      const cam = this.cameras[idx];
      const state = this.camStates[idx];
      if (!cam || !state?.currentSegment) return '#';
      return this.segmentUrl(cam.name, state.currentSegment) + '?download=1';
    },

    getVideo(idx) {
      return document.getElementById('video-' + idx);
    },

    loadSegmentsForAll() {
      this.cameras.forEach((_, idx) => this.loadSegmentForCamera(idx));
    },

    loadSegmentForCamera(idx) {
      const cam = this.cameras[idx];
      const video = this.getVideo(idx);
      if (!video || !cam) return;

      const found = this.findSegmentAt(cam.name, this.wallTime);
      const state = this.camStates[idx];

      if (!found) {
        // During live playback, wallTime can briefly land in a gap
        // between segments (a missing/failed segment, or sub-second
        // ffmpeg rotation drift). Leave the current frame and stale
        // state in place; the free-running clock will advance out of
        // the gap and the next tick will find a real segment. Only
        // clear when not playing — an explicit scrub into an empty
        // region, or a day switch, should actually blank out.
        if (this.playing) return;
        if (state) {
          state.currentSegment = null;
          state.nextSegment = null;
          state.loadedSrc = null;
          state.videoLoading = false;
        }
        video.onloadedmetadata = null;
        video.removeAttribute('src');
        video.load();
        return;
      }

      const seg = found.segment;
      const next = this.findNextSegment(cam.name, seg);
      const url = this.segmentUrl(cam.name, seg);
      this._debug({
        kind: 'load', ev: 'call', cam: idx, file: seg.filename,
        was: state?.loadedSrc ? state.loadedSrc.split('/').pop() : null,
      });

      // Only reload video source if the segment actually changed
      if (state && state.loadedSrc === url) {
        state.currentSegment = seg;
        state.nextSegment = next;
        this._seekVideo(video, seg);
        if (this.playing && video.paused) {
          video.playbackRate = this.playbackSpeed;
          video.play().catch(() => {});
        }
        this._prefetchNextSegment(idx);
        return;
      }

      if (state) {
        state.currentSegment = seg;
        state.nextSegment = next;
        state.loadedSrc = url;
        state.videoLoading = true;
      }

      video.src = url;

      // Use onX (not addEventListener) so that rapid segment changes
      // replace the handler instead of accumulating stale listeners
      video.onloadedmetadata = () => {
        video.onloadedmetadata = null;
        if (state) state.videoLoading = false;
        video.muted = this.unmutedIdx !== idx;
        this._seekVideo(video, seg);
        if (this.playing) {
          video.playbackRate = this.playbackSpeed;
          video.play().catch(() => {});
        }
        this._prefetchNextSegment(idx);
      };

      video.onerror = () => {
        video.onerror = null;
        if (state) state.videoLoading = false;
        // Segment failed to load (corrupt file, 500, etc.) — skip it
        this._onSegmentEnd(idx);
      };

      video.onended = () => this._onSegmentEnd(idx);
    },

    _seekVideo(video, seg) {
      if (!video || !seg || !this.wallTime) return;
      const segStart = this._parseStart(seg).getTime();
      const offset = (this.wallTime.getTime() - segStart) / 1000;
      const dur = isNaN(video.duration) ? (seg.duration_sec || this._segmentDurationMs / 1000) : video.duration;
      const target = Math.max(0, Math.min(offset, dur));
      if (Math.abs(video.currentTime - target) > 0.5) {
        video.currentTime = target;
      }
    },

    _onSegmentEnd(idx) {
      const state = this.camStates[idx];
      if (!state) return;

      if (idx === 0) {
        // Jump wallTime forward to next segment if needed, but NEVER backward.
        // A backward jump here is what caused the seek snap-back: short/corrupt
        // segments end before wallTime, and the next segment starts earlier
        // than where we seeked to.
        if (state.nextSegment) {
          const nextStart = this._parseStart(state.nextSegment);
          if (nextStart > this.wallTime) {
            this.wallTime = nextStart;
          }
        }
        this.loadSegmentsForAll();
      } else {
        this.loadSegmentForCamera(idx);
      }
    },

    togglePlay() {
      if (this.playing) {
        this.pause();
      } else {
        this.play();
      }
    },

    play() {
      this.playing = true;
      this.cameras.forEach((_, idx) => {
        const video = this.getVideo(idx);
        const state = this.camStates[idx];
        if (video && state?.currentSegment) {
          video.playbackRate = this.playbackSpeed;
          video.play().catch(() => {});
        }
      });
      this._startClock();
    },

    pause() {
      this.playing = false;
      this._stopClock();
      this.cameras.forEach((_, idx) => {
        const video = this.getVideo(idx);
        if (video && !video.paused) video.pause();
      });
    },

    _startClock() {
      this._stopClock();
      let lastTick = performance.now();
      const tick = (now) => {
        if (!this.playing) return;

        const dt = (now - lastTick) / 1000;
        lastTick = now;
        const settling = now < this._seekUntil;

        if (!this.scrubbing && !this._fsScrubbing && !settling) {
          const v0 = this.getVideo(0);
          const s0 = this.camStates[0];

          if (v0 && s0?.currentSegment && !v0.paused && !v0.seeking && v0.readyState >= 2) {
            // Sync clock from primary video to prevent drift
            const segStart = this._parseStart(s0.currentSegment).getTime();
            this.wallTime = new Date(segStart + v0.currentTime * 1000);
          } else {
            // Video not usable — free-run the clock
            this.wallTime = new Date(this.wallTime.getTime() + dt * this.playbackSpeed * 1000);
          }

          // Stop at end of recordings
          const latest = this._latestEnd();
          if (latest && this.wallTime.getTime() >= latest) {
            this.wallTime = new Date(latest);
            this.pause();
            this._clockId = null;
            return;
          }
        }

        // Sync all cameras: check segment boundaries, load new segments
        for (let i = 0; i < this.cameras.length; i++) {
          const state = this.camStates[i];
          if (!state) continue;
          const camName = this.cameras[i].name;
          const segs = this.segments[camName] || [];
          if (!state.currentSegment) {
            const found = this.findSegmentAt(camName, this.wallTime);
            if (found) this.loadSegmentForCamera(i);
          } else {
            const segIdx = segs.indexOf(state.currentSegment);
            const segStart = this._parseStart(state.currentSegment).getTime();
            const segEnd = segIdx >= 0 ? this._segEnd(segs, segIdx) : segStart + this._segmentDurationMs;
            const wt = this.wallTime.getTime();
            if (wt >= segEnd || wt < segStart) {
              this.loadSegmentForCamera(i);
            } else if (i > 0) {
              // Keep non-primary cameras in sync (only seek if drift > 2s)
              const video = this.getVideo(i);
              if (video && !video.seeking && video.readyState >= 2) {
                const offset = (wt - segStart) / 1000;
                if (Math.abs(video.currentTime - offset) > 2) {
                  video.currentTime = offset;
                }
              }
            }
          }
        }

        this._clockId = requestAnimationFrame(tick);
      };
      this._clockId = requestAnimationFrame(tick);
    },

    _stopClock() {
      if (this._clockId) {
        cancelAnimationFrame(this._clockId);
        this._clockId = null;
      }
    },

    applySpeed() {
      this.cameras.forEach((_, idx) => {
        const video = this.getVideo(idx);
        if (video) video.playbackRate = this.playbackSpeed;
      });
    },

    toggleFullscreen(idx) {
      this.fullscreenIdx = this.fullscreenIdx === idx ? null : idx;
    },

    toggleMute(idx) {
      if (this.unmutedIdx === idx) {
        // Mute this camera
        const video = this.getVideo(idx);
        if (video) video.muted = true;
        this.unmutedIdx = null;
      } else {
        // Mute previously unmuted camera
        if (this.unmutedIdx !== null) {
          const prev = this.getVideo(this.unmutedIdx);
          if (prev) prev.muted = true;
        }
        // Unmute this camera
        const video = this.getVideo(idx);
        if (video) video.muted = false;
        this.unmutedIdx = idx;
      }
    },

    handleKey(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
      switch (e.code) {
        case 'Space':
          e.preventDefault();
          this.togglePlay();
          break;
        case 'ArrowRight':
          e.preventDefault();
          this._seekByKey(e.shiftKey ? 5000 : 30000);
          break;
        case 'ArrowLeft':
          e.preventDefault();
          this._seekByKey(e.shiftKey ? -5000 : -30000);
          break;
        case 'Escape':
          this.fullscreenIdx = null;
          break;
      }
    },

    _seekUntil: 0, // performance.now() deadline; suppresses video→clock sync

    _seekByKey(ms) {
      this.wallTime = new Date(this.wallTime.getTime() + ms);
      this._clampWallTime();
      this._seekUntil = performance.now() + 500;
      this.loadSegmentsForAll();
    },

    // -- Timeline --

    timelineSegments(cam) {
      const segs = this.segments[cam.name] || [];
      const isRecording = cam.state === 'recording';
      return segs.filter((seg, i) => {
        // Valid duration: show it
        if (seg.duration_sec > 0) return true;
        // 0 = probed and failed; null = not yet probed.
        // Show the newest not-yet-probed segment if the camera is
        // actively recording (it's the live segment).
        return seg.duration_sec == null && isRecording && i === segs.length - 1;
      });
    },

    segmentBlockStyle(seg) {
      const start = this._parseStart(seg);
      const sod = this._startOfDay();
      const dayLen = this._dayLengthMs();
      const left = (start - sod) / dayLen * 100;
      let durMs;
      if (seg.duration_sec > 0) {
        durMs = seg.duration_sec * 1000;
      } else {
        // Active recording: extend to now, capped at segment duration
        durMs = Math.min(Date.now() - start.getTime(), this._segmentDurationMs);
      }
      const width = durMs / dayLen * 100;
      return `left:${left}%;width:${width}%`;
    },

    // -- Scrubbing --

    startScrub(e) {
      this.scrubbing = true;
      const point = e.touches ? e.touches[0] : e;
      this._scrubToPoint(point);
    },

    doScrub(e) {
      if (!this.scrubbing) return;
      this._scrubToPoint(e);
    },

    endScrub() {
      if (!this.scrubbing) return;
      this.scrubbing = false;
      this._seekUntil = performance.now() + 500;
      this.loadSegmentsForAll();
    },

    _scrubToPoint(e) {
      const overlay = this.$refs.timelineBody?.querySelector('.timeline-click-overlay');
      if (!overlay) return;
      const rect = overlay.getBoundingClientRect();
      const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
      const pct = x / rect.width;
      this.wallTime = new Date(this._startOfDay().getTime() + pct * this._dayLengthMs());
      this._clampWallTime();
      this.loadSegmentsForAll();
    },

    onTimelineHover(e) {
      const rect = e.currentTarget.getBoundingClientRect();
      const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
      const frac = x / rect.width;
      this.hoverPct = frac * 100;
      this.hoverTime = new Date(this._startOfDay().getTime() + frac * this._dayLengthMs());
    },

    get hoverTimeDisplay() {
      if (!this.hoverTime) return '';
      const d = this.hoverTime;
      return String(d.getMinutes()).padStart(2, '0') + ':' + String(d.getSeconds()).padStart(2, '0');
    },

    // -- Fullscreen scrubbing --

    _segmentDurationMs: 60000, // fixed 1-minute segments, see recorder.py
    _fsScrubbing: false,
    _fsScrubEl: null,

    _fsTimeFromEvent(e) {
      if (!this._fsScrubEl) return null;
      const rect = this._fsScrubEl.getBoundingClientRect();
      const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
      const pct = x / rect.width;
      return new Date(this._startOfDay().getTime() + pct * this._dayLengthMs());
    },

    startFsScrubOrSelect(e) {
      this._fsScrubEl = e.currentTarget;
      const point = e.touches ? e.touches[0] : e;
      if (e.shiftKey) {
        const clickedTime = this._fsTimeFromEvent(point);
        if (!clickedTime) return;
        if (this.wallTime < clickedTime) {
          this.selectionStart = new Date(this.wallTime);
          this.selectionEnd = clickedTime;
        } else {
          this.selectionStart = clickedTime;
          this.selectionEnd = new Date(this.wallTime);
        }
        return;
      }
      this.clearSelection();
      this.startFsScrub(e);
    },

    startFsScrub(e) {
      this._fsScrubbing = true;
      this._fsScrubEl = e.currentTarget;
      const point = e.touches ? e.touches[0] : e;
      this._fsScrubToPoint(point);
    },

    doFsScrub(e) {
      if (!this._fsScrubbing) return;
      this._fsScrubToPoint(e);
    },

    endFsScrub() {
      if (!this._fsScrubbing) return;
      this._fsScrubbing = false;
      this._fsScrubEl = null;
      this._seekUntil = performance.now() + 500;
      this.loadSegmentsForAll();
    },

    _fsScrubToPoint(e) {
      if (!this._fsScrubEl) return;
      const rect = this._fsScrubEl.getBoundingClientRect();
      const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
      const pct = x / rect.width;
      this.wallTime = new Date(this._startOfDay().getTime() + pct * this._dayLengthMs());
      this._clampWallTime();
      this.loadSegmentsForAll();
    },

    // -- Range selection --

    _timeFromOverlayEvent(e) {
      const overlay = this.$refs.timelineBody?.querySelector('.timeline-click-overlay');
      if (!overlay) return null;
      const rect = overlay.getBoundingClientRect();
      const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
      const pct = x / rect.width;
      return new Date(this._startOfDay().getTime() + pct * this._dayLengthMs());
    },

    startScrubOrSelect(e) {
      const point = e.touches ? e.touches[0] : e;
      if (e.shiftKey) {
        const clickedTime = this._timeFromOverlayEvent(point);
        if (!clickedTime) return;
        // Set range from current wallTime to shift-clicked point
        if (this.wallTime < clickedTime) {
          this.selectionStart = new Date(this.wallTime);
          this.selectionEnd = clickedTime;
        } else {
          this.selectionStart = clickedTime;
          this.selectionEnd = new Date(this.wallTime);
        }
        return;
      }
      // Normal click: clear selection and scrub
      this.clearSelection();
      this.startScrub(e);
    },

    clearSelection() {
      this.selectionStart = null;
      this.selectionEnd = null;
    },

    selectionStyle() {
      if (!this.selectionStart || !this.selectionEnd) return 'display:none';
      const sod = this._startOfDay();
      const dayLen = this._dayLengthMs();
      const startPct = (this.selectionStart - sod) / dayLen * 100;
      const endPct = (this.selectionEnd - sod) / dayLen * 100;
      const left = Math.max(0, Math.min(100, startPct));
      const right = Math.max(0, Math.min(100, endPct));
      return `left:${left}%;width:${right - left}%`;
    },

    selectionRangeDisplay() {
      if (!this.selectionStart || !this.selectionEnd) return '';
      const fmt = d => [d.getHours(), d.getMinutes(), d.getSeconds()]
        .map(n => String(n).padStart(2, '0')).join(':');
      return fmt(this.selectionStart) + ' \u2013 ' + fmt(this.selectionEnd);
    },

    rangeDownloadUrl(camName) {
      if (!this.selectionStart || !this.selectionEnd) return '#';
      const s = this.selectionStart.toISOString();
      const e = this.selectionEnd.toISOString();
      return `/api/cameras/${encodeURIComponent(camName)}/download?start=${encodeURIComponent(s)}&end=${encodeURIComponent(e)}`;
    },

    _estimateDownloadSize(camName) {
      const segs = this.segments[camName] || [];
      if (!this.selectionStart || !this.selectionEnd || !segs.length) return 0;
      const selStart = this.selectionStart.getTime();
      const selEnd = this.selectionEnd.getTime();
      let total = 0;
      for (const seg of segs) {
        const segStart = new Date(seg.start_time).getTime();
        const dur = (seg.duration_sec || this._segmentDurationMs / 1000) * 1000;
        const segEnd = segStart + dur;
        if (segEnd <= selStart || segStart >= selEnd) continue;
        // Pro-rate partial overlap
        const overlapStart = Math.max(segStart, selStart);
        const overlapEnd = Math.min(segEnd, selEnd);
        const fraction = (overlapEnd - overlapStart) / dur;
        total += (seg.size_bytes || 0) * fraction;
      }
      return total;
    },

    async downloadRange(camName) {
      const url = this.rangeDownloadUrl(camName);
      if (url === '#') return;
      this.downloadingCam = camName;
      this.downloadPercent = 0;
      try {
        const res = await fetch(url);
        if (!res.ok) {
          const detail = await res.text();
          alert('Download failed: ' + detail);
          return;
        }

        const estimatedSize = this._estimateDownloadSize(camName);
        const reader = res.body.getReader();
        const chunks = [];
        let received = 0;
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          received += value.length;
          if (estimatedSize > 0) {
            this.downloadPercent = Math.min(99, Math.round(received / estimatedSize * 100));
          }
        }
        this.downloadPercent = 100;

        const blob = new Blob(chunks, { type: 'video/mp4' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        const cd = res.headers.get('Content-Disposition');
        const match = cd && cd.match(/filename="(.+)"/);
        a.download = match ? match[1] : `${camName}.mp4`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
      } catch (e) {
        alert('Download failed: ' + e.message);
      } finally {
        this.downloadingCam = null;
        this.downloadPercent = null;
      }
    },
  };
}
</script>
