<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TinyNVR</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
[x-cloak] { display: none !important; }

:root {
  --bg: #1a1a1a;
  --panel: #2a2a2a;
  --border: #3a3a3a;
  --text: #e0e0e0;
  --text-dim: #888;
  --green: #4caf50;
  --red: #e53935;
  --gray: #666;
  --accent: #5c9ce6;
  --timeline-bg: #222;
  --segment-color: #4caf50;
  --timeline-label-width: 90px;
  --timeline-right-pad: 12px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 14px;
  overflow: hidden;
}

/* Top bar */
.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 8px 16px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  height: 48px;
  flex-shrink: 0;
}
/* Week day picker */
.week-picker {
  display: flex;
  align-items: center;
  gap: 2px;
}
.week-picker .wp-arrow {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  padding: 2px 6px;
  line-height: 1;
}
.week-picker .wp-arrow:hover { color: var(--text); }
.week-picker .wp-day {
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 6px;
  min-width: 32px;
  gap: 1px;
}
.week-picker .wp-day:hover { background: var(--border); }
.week-picker .wp-day-label {
  font-size: 9px;
  color: var(--text-dim);
  text-transform: uppercase;
  font-weight: 500;
}
.week-picker .wp-day-num {
  font-size: 13px;
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
}
.week-picker .wp-day.selected .wp-day-num {
  background: #e87530;
  color: #fff;
  font-weight: 600;
}
.week-picker .wp-day.today .wp-day-label {
  color: #e87530;
}
.week-picker .wp-day.future,
.week-picker .wp-day.no-data {
  opacity: 0.3;
  pointer-events: none;
}
.topbar select {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 13px;
}
.topbar button {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 12px;
  font-size: 16px;
  cursor: pointer;
  line-height: 1;
}
.topbar button:hover { background: var(--border); }
.topbar-play {
  display: flex;
  align-items: center;
  justify-content: center;
}
.topbar-play svg { width: 16px; height: 16px; }
.topbar .time-display {
  font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
  font-size: 16px;
  color: var(--text);
  min-width: 70px;
}
.topbar .spacer { flex: 1; }
.topbar .version {
  font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
  font-size: 10px;
  color: var(--text-dim);
  opacity: 0.6;
  margin-right: 4px;
}

/* Main grid */
.main {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(var(--grid-cols, 2), 1fr);
  grid-auto-rows: 1fr;
  gap: 2px;
  padding: 2px;
  min-height: 0;
  background: var(--bg);
}

.video-panel {
  background: #000;
  position: relative;
  overflow: hidden;
  border-radius: 2px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.video-panel.fullscreen-panel {
  position: fixed;
  inset: 0;
  z-index: 100;
  border-radius: 0;
}
.video-panel video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}
.video-panel .panel-header {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  padding: 6px 10px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
  z-index: 2;
  pointer-events: none;
}
.video-panel.fullscreen-panel .panel-header { display: none; }
.panel-header .cam-name {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.panel-actions {
  position: absolute;
  bottom: 8px;
  left: 10px;
  z-index: 3;
  pointer-events: auto;
  display: flex;
  gap: 6px;
}
.panel-mute {
  position: absolute;
  top: 6px;
  right: 8px;
  z-index: 3;
  background: none;
  border: none;
  color: var(--text);
  opacity: 0.6;
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.panel-mute svg { width: 18px; height: 18px; }
.panel-mute:hover { opacity: 1; }
.video-panel.fullscreen-panel .panel-mute { display: none; }
.panel-action-btn {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
}
.panel-actions a,
.panel-actions .panel-action-btn {
  color: var(--text);
  text-decoration: none;
  opacity: 0;
  transition: opacity 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.panel-actions a svg,
.panel-actions .panel-action-btn svg {
  width: 20px;
  height: 20px;
}
.video-panel:hover .panel-actions a,
.video-panel:hover .panel-actions .panel-action-btn { opacity: 0.8; }
.panel-actions a:hover,
.panel-actions .panel-action-btn:hover { opacity: 1 !important; }
.video-panel.fullscreen-panel .panel-actions { display: none; }

.no-recording-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.6);
  z-index: 1;
  font-size: 14px;
  color: var(--text-dim);
}

/* Bottom timeline */
.timeline-container {
  flex-shrink: 0;
  background: var(--panel);
  border-top: 1px solid var(--border);
  padding: 6px 0 2px 0;
  user-select: none;
}
.timeline-body {
  position: relative;
}
.timeline-tracks {
  margin-left: var(--timeline-label-width);
  margin-right: var(--timeline-right-pad);
}
.timeline-track {
  display: flex;
  align-items: center;
  height: 10px;
  margin-bottom: 1px;
  position: relative;
}
.timeline-track-label {
  position: absolute;
  left: calc(-1 * var(--timeline-label-width) + 2px);
  width: calc(var(--timeline-label-width) - 6px);
  text-align: right;
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.timeline-track-bar {
  flex: 1;
  height: 6px;
  background: var(--bg);
  position: relative;
  border-radius: 1px;
  overflow: hidden;
}
.timeline-segment-block {
  position: absolute;
  top: 0;
  height: 100%;
  background: var(--segment-color);
}

/* Hour labels */
.timeline-hours {
  position: relative;
  margin-left: var(--timeline-label-width);
  margin-right: var(--timeline-right-pad);
  height: 18px;
}
.timeline-hour-mark {
  position: absolute;
  top: 2px;
  font-size: 9px;
  color: var(--text-dim);
  transform: translateX(-50%);
}
.timeline-hour-tick {
  position: absolute;
  top: 0;
  width: 1px;
  height: 3px;
  background: var(--border);
  transform: translateX(-50%);
}

/* Cursor region overlays the track+hours area with same margins */
.timeline-cursor-region {
  position: absolute;
  top: 0;
  bottom: 0;
  left: var(--timeline-label-width);
  right: var(--timeline-right-pad);
  pointer-events: none;
  z-index: 5;
}
.timeline-cursor-line {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--red);
  transform: translateX(-1px);
}
.timeline-hover-tooltip {
  position: absolute;
  top: -14px;
  transform: translateX(-50%);
  font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
  font-size: 10px;
  color: var(--text);
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 1px 4px;
  white-space: nowrap;
  pointer-events: none;
}
.timeline-hover-preview {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  margin-bottom: 18px;
  padding: 2px;
  pointer-events: none;
  transform: translateX(-50%);
  z-index: 11;
  border: 1px solid rgba(255, 255, 255, 0.2);
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
  background: #000;
  max-width: calc(100vw - 24px);
  overflow: hidden;
}
.timeline-hover-preview-row {
  background-repeat: no-repeat;
  background-color: #111;
  flex-shrink: 0;
}

/* Click overlay for scrubbing - covers tracks + hours */
.timeline-click-overlay {
  position: absolute;
  top: 0;
  bottom: 0;
  left: var(--timeline-label-width);
  right: var(--timeline-right-pad);
  cursor: pointer;
  z-index: 4;
}

/* Fullscreen overlay controls */
.fs-overlay {
  position: absolute;
  inset: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  pointer-events: none;
}
.fs-overlay > * { pointer-events: auto; }
.fs-top {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
}
.fs-top .fs-cam-name {
  font-size: 15px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.fs-top .fs-close {
  background: rgba(255,255,255,0.15);
  border: none;
  color: var(--text);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.fs-top .fs-close:hover { background: rgba(255,255,255,0.25); }
.fs-top .spacer { flex: 1; }
.fs-bottom {
  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  padding: 24px 16px 12px;
}
.fs-time {
  text-align: center;
  margin-bottom: 8px;
}
.fs-time .fs-time-value {
  font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
  font-size: 18px;
  color: var(--text);
}
.fs-time .fs-date-value {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
}
.fs-left-controls {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 6px;
  flex-shrink: 0;
}
.fs-mute {
  background: none;
  border: none;
  color: var(--text);
  opacity: 0.7;
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
}
.fs-mute:hover { opacity: 1; }
.fs-mute svg { width: 20px; height: 20px; }
.fs-download {
  color: var(--text);
  text-decoration: none;
  background: none;
  border: none;
  opacity: 0.7;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  padding: 0;
  cursor: pointer;
}
.fs-download:hover:not(:disabled) { opacity: 1; }
.fs-download:disabled { cursor: wait; }
.fs-download svg { width: 20px; height: 20px; }
.fs-speed {
  background: rgba(255,255,255,0.12);
  color: var(--text);
  border: none;
  border-radius: 14px;
  padding: 4px 12px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  height: 28px;
}
.fs-scrub-row {
  display: flex;
  align-items: flex-end;
  gap: 10px;
}
.fs-play-timeline {
  display: flex;
  align-items: center;
  flex: 1;
  height: 28px;
  background: rgba(255,255,255,0.1);
  border-radius: 6px;
  overflow: visible;
  position: relative;
}
.fs-play {
  background: none;
  border: none;
  color: var(--text);
  cursor: pointer;
  padding: 0 8px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  opacity: 0.9;
}
.fs-play:hover { opacity: 1; }
.fs-play svg { width: 14px; height: 14px; }
.fs-play-divider {
  width: 1px;
  height: 16px;
  background: rgba(255,255,255,0.2);
  flex-shrink: 0;
}
.fs-timeline {
  position: relative;
  height: 100%;
  flex: 1;
}
.fs-timeline-bar {
  position: absolute;
  top: 8px;
  left: 0;
  right: 0;
  height: 12px;
  background: transparent;
  border-radius: 2px;
  overflow: hidden;
}
.fs-timeline-segment {
  position: absolute;
  top: 0;
  height: 100%;
  background: var(--segment-color);
}
.fs-timeline-cursor {
  position: absolute;
  top: 4px;
  width: 2px;
  height: 20px;
  background: #fff;
  border-radius: 1px;
  transform: translateX(-1px);
  pointer-events: none;
}
.fs-timeline-click {
  position: absolute;
  inset: 0;
  cursor: pointer;
}

/* Selection highlight */
.timeline-selection {
  position: absolute;
  top: 0;
  bottom: 0;
  background: rgba(92, 156, 230, 0.25);
  border-left: 1px solid var(--accent);
  border-right: 1px solid var(--accent);
  pointer-events: none;
  z-index: 3;
}

/* Download bar */
.selection-download-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 12px 4px var(--timeline-label-width);
  background: var(--panel);
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-dim);
  flex-shrink: 0;
}
.selection-download-bar .sel-range {
  font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
  color: var(--text);
  font-size: 12px;
}
.selection-download-bar .sel-dl-btn {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 10px;
  font-size: 12px;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.selection-download-bar .sel-dl-btn:hover:not(:disabled) { background: var(--border); }
.selection-download-bar .sel-dl-btn:disabled { opacity: 0.5; cursor: wait; }
.selection-download-bar .sel-clear {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 14px;
  padding: 0 4px;
  line-height: 1;
}
.selection-download-bar .sel-clear:hover { color: var(--text); }

/* Layout shell */
.app-shell {
  display: flex;
  flex-direction: column;
  height: 100vh;
}
</style>
</head>
<body>
<div class="app-shell" x-data="nvr()" @keydown.window="handleKey($event)">

  <!-- Top bar -->
  <div class="topbar">
    <div class="week-picker">
      <button class="wp-arrow" :style="!canGoBack && 'opacity:0.2;pointer-events:none'" @click="weekOffset--; buildWeek()">&lsaquo;</button>
      <template x-for="day in weekDays" :key="day.iso">
        <div class="wp-day"
             :class="{ selected: day.iso === selectedDate, today: day.isToday, future: day.isFuture, 'no-data': day.beforeEarliest }"
             @click="!day.isFuture && !day.beforeEarliest && changeDate(day.iso)">
          <span class="wp-day-label" x-text="day.label"></span>
          <span class="wp-day-num" x-text="day.num"></span>
        </div>
      </template>
      <button class="wp-arrow" :style="!canGoForward && 'opacity:0.2;pointer-events:none'" @click="weekOffset++; buildWeek()">&rsaquo;</button>
    </div>
    <button class="topbar-play" @click="togglePlay">
      <svg x-show="!playing" viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><polygon points="6,3 20,12 6,21"/></svg>
      <svg x-show="playing" viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><rect x="5" y="3" width="4" height="18" rx="1"/><rect x="15" y="3" width="4" height="18" rx="1"/></svg>
    </button>
    <select x-model.number="playbackSpeed" @change="applySpeed()">
      <option value="0.25">0.25x</option>
      <option value="0.5">0.5x</option>
      <option value="1">1x</option>
      <option value="2">2x</option>
      <option value="4">4x</option>
      <option value="8">8x</option>
    </select>
    <span class="time-display" x-text="currentTimeDisplay"></span>
    <div class="spacer"></div>
    <span class="version" x-text="version" x-show="version"></span>
  </div>

  <!-- Video grid -->
  <div class="main" :style="'--grid-cols:' + gridColumns">
    <template x-for="(cam, idx) in cameras" :key="cam.name">
      <div class="video-panel"
           :class="{'fullscreen-panel': fullscreenIdx === idx}"
           @click="fullscreenIdx === null && toggleFullscreen(idx)">
        <div class="panel-header">
          <span class="cam-name" x-text="cam.name"></span>
        </div>
        <button class="panel-mute" @click.stop="toggleMute(idx)" :title="unmutedIdx === idx ? 'Mute' : 'Unmute'">
          <svg x-show="unmutedIdx === idx" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
          <svg x-show="unmutedIdx !== idx" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <line x1="23" y1="9" x2="17" y2="15"/>
            <line x1="17" y1="9" x2="23" y2="15"/>
          </svg>
        </button>
        <div class="panel-actions" x-show="camStates[idx]?.currentSegment" x-cloak>
          <a :href="downloadUrl(idx)" :download="downloadFilename(idx)" @click.stop title="Download segment">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </a>
        </div>
        <video :id="'video-' + idx"
               x-init="_initVideoEl(idx, $el)"
               preload="auto"
               muted
               playsinline>
        </video>
        <div class="no-recording-overlay"
             x-show="!camStates[idx]?.currentSegment || camStates[idx]?.videoLoading"
             x-cloak>
          <span x-text="(loading || camStates[idx]?.videoLoading) ? 'Loading\u2026' : 'Offline'"></span>
        </div>
        <!-- Fullscreen overlay with controls + timeline -->
        <div class="fs-overlay" x-show="fullscreenIdx === idx" x-cloak @click.stop>
          <div class="fs-top">
            <button class="fs-close" @click="fullscreenIdx = null">&times;</button>
            <span class="fs-cam-name" x-text="cam.name"></span>
            <div class="spacer"></div>
            <button class="fs-mute" @click.stop="toggleMute(idx)" :title="unmutedIdx === idx ? 'Mute' : 'Unmute'">
              <svg x-show="unmutedIdx === idx" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              </svg>
              <svg x-show="unmutedIdx !== idx" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <line x1="23" y1="9" x2="17" y2="15"/>
                <line x1="17" y1="9" x2="23" y2="15"/>
              </svg>
            </button>
          </div>
          <div class="fs-bottom">
            <div class="fs-time">
              <span class="fs-time-value" x-text="currentTimeDisplay"></span>
              <div class="fs-date-value" x-text="currentDateDisplay"></div>
            </div>
            <div class="fs-scrub-row">
              <div class="fs-left-controls">
                <button class="fs-download"
                        x-show="selectionStart && selectionEnd"
                        x-cloak
                        :disabled="downloadingCam"
                        @click.stop="downloadRange(cam.name)"
                        :title="downloadingCam === cam.name ? 'Preparing...' : 'Download selection'">
                  <svg x-show="downloadingCam !== cam.name" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                  </svg>
                  <span x-show="downloadingCam === cam.name" style="font-size:11px;" x-text="downloadPercent != null ? downloadPercent + '%' : '...'"></span>
                </button>
                <a class="fs-download" x-show="!selectionStart && camStates[idx]?.currentSegment"
                   :href="downloadUrl(idx)" :download="downloadFilename(idx)" @click.stop title="Download segment">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                  </svg>
                </a>
                <select class="fs-speed" x-model.number="playbackSpeed" @change="applySpeed()">
                  <option value="1">1x</option>
                  <option value="2">2x</option>
                  <option value="4">4x</option>
                  <option value="8">8x</option>
                </select>
              </div>
              <div class="fs-play-timeline">
                <button class="fs-play" @click.stop="togglePlay">
                  <svg x-show="!playing" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>
                  <svg x-show="playing" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="3" width="4" height="18" rx="1"/><rect x="15" y="3" width="4" height="18" rx="1"/></svg>
                </button>
                <div class="fs-play-divider"></div>
                <div class="fs-timeline">
              <div class="fs-timeline-bar">
                <template x-for="interval in timelineIntervals(cam)" :key="'fs-'+interval.start">
                  <div class="fs-timeline-segment" :style="intervalBlockStyle(interval)"></div>
                </template>
              </div>
              <div class="timeline-selection" x-show="selectionStart && selectionEnd" x-cloak
                   :style="selectionStyle()"></div>
              <div class="fs-timeline-cursor" :style="'left:' + cursorPercent + '%'"></div>
              <div class="timeline-hover-tooltip"
                   x-show="hoverPct !== null"
                   x-cloak
                   :style="'left:' + hoverPct + '%'"
                   x-text="hoverTimeDisplay"></div>
              <div class="timeline-hover-preview"
                   x-show="hoverPreview.visible"
                   x-cloak
                   :style="hoverPreviewStyle">
                <template x-for="row in hoverPreview.rows" :key="row.cam">
                  <div class="timeline-hover-preview-row" :style="row.style"></div>
                </template>
              </div>
              <div class="fs-timeline-click"
                   @mousedown.prevent="startFsScrubOrSelect($event)"
                   @mousemove="onTimelineHover($event)"
                   @mousemove.window="doFsScrub($event)"
                   @mouseleave="onTimelineLeave()"
                   @mouseup.window="endFsScrub()"
                   @touchstart.prevent="startFsScrub($event)"
                   @touchmove.window="doFsScrub($event.touches[0])"
                   @touchend.window="endFsScrub()">
              </div>
            </div>
            </div>
            </div>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- Timeline -->
  <div class="timeline-container">
    <div class="timeline-body" x-ref="timelineBody">
      <!-- Segment tracks -->
      <div class="timeline-tracks" x-ref="timelineTracks">
        <template x-for="(cam, idx) in cameras" :key="'track-'+cam.name">
          <div class="timeline-track">
            <span class="timeline-track-label" x-text="cam.name"></span>
            <div class="timeline-track-bar">
              <template x-for="interval in timelineIntervals(cam)" :key="interval.start">
                <div class="timeline-segment-block"
                     :style="intervalBlockStyle(interval)"></div>
              </template>
            </div>
          </div>
        </template>
      </div>
      <!-- Hour labels -->
      <div class="timeline-hours">
        <template x-for="(tick, i) in hourTicks" :key="i">
          <span>
            <span class="timeline-hour-tick" :style="'left:' + tick.leftPct + '%'"></span>
            <span class="timeline-hour-mark"
                  :style="'left:' + tick.leftPct + '%'"
                  x-text="tick.label"></span>
          </span>
        </template>
      </div>
      <!-- Selection highlight -->
      <div class="timeline-cursor-region" style="pointer-events:none; z-index:3;"
           x-show="selectionStart && selectionEnd" x-cloak>
        <div class="timeline-selection"
             :style="selectionStyle()"></div>
      </div>
      <!-- Cursor spanning entire timeline body -->
      <div class="timeline-cursor-region">
        <div class="timeline-cursor-line"
             :style="'left:' + cursorPercent + '%'">
        </div>
        <div class="timeline-hover-tooltip"
             x-show="hoverPct !== null"
             x-cloak
             :style="'left:' + hoverPct + '%'"
             x-text="hoverTimeDisplay"></div>
        <div class="timeline-hover-preview"
             x-show="hoverPreview.visible"
             x-cloak
             :style="hoverPreviewStyle">
          <template x-for="(row, i) in hoverPreview.rows" :key="row.cam">
            <div class="timeline-hover-preview-row" :style="row.style"></div>
          </template>
        </div>
      </div>
      <!-- Invisible click overlay for scrubbing -->
      <div class="timeline-click-overlay"
           @mousedown.prevent="startScrubOrSelect($event)"
           @mousemove="onTimelineHover($event)"
           @mousemove.window="doScrub($event)"
           @mouseleave="onTimelineLeave()"
           @mouseup.window="endScrub()"
           @touchstart.prevent="startScrub($event)"
           @touchmove.window="doScrub($event.touches[0])"
           @touchend.window="endScrub()">
      </div>
    </div>
  </div>

  <!-- Selection download bar -->
  <div class="selection-download-bar" x-show="selectionStart && selectionEnd" x-cloak>
    <span class="sel-range" x-text="selectionRangeDisplay()"></span>
    <template x-for="cam in cameras" :key="'dl-'+cam.name">
      <button class="sel-dl-btn" :disabled="downloadingCam" @click="downloadRange(cam.name)">
        <svg x-show="downloadingCam !== cam.name" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span x-text="downloadingCam === cam.name ? (downloadPercent != null ? downloadPercent + '%' : 'Preparing...') : cam.name"></span>
      </button>
    </template>
    <button class="sel-clear" @click="clearSelection()" title="Clear selection">&times;</button>
  </div>
</div>

<script defer src="mp4box.all.min.js"></script>
<script defer src="app.js"></script>
<script defer src="alpine.min.js"></script>
</body>
</html>
